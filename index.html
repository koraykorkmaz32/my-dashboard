<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kişisel Dashboard</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#e5e7eb;
}

#app{
  display:grid;
  grid-template-columns: 2fr 1fr 2fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

.panel{
  background:#020617;
  border-radius:10px;
  padding:10px;
  overflow:auto;
}

h2{
  margin:5px 0;
  border-bottom:1px solid #1e293b;
  padding-bottom:5px;
}

/* Takvim */

#months{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:5px;
}

.month{
  background:#020617;
  padding:10px;
  text-align:center;
  border:1px solid #1e293b;
  cursor:pointer;
}

.month:hover{
  background:#1e293b;
}

#weekdays{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  text-align:center;
  font-size:12px;
  margin-top:5px;
}

#days{
  display:grid;
  grid-template-columns: repeat(7,1fr);
  gap:5px;
}

.day{
  border:1px solid #1e293b;
  height:60px;
  text-align:center;
  cursor:pointer;
  position:relative;
  padding-top:5px;
}

.dot{
  width:6px;
  height:6px;
  background:#22c55e;
  border-radius:50%;
  position:absolute;
  bottom:5px;
  right:5px;
}

/* Text */

textarea{
  width:100%;
  background:#020617;
  color:white;
  border:1px solid #1e293b;
  margin:5px 0;
}

/* Buton */

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:4px 8px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

/* Görev */

.task{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.done{
  text-decoration:line-through;
  color:#64748b;
}

/* Finans Tablo */

table{
  width:100%;
  border-collapse:collapse;
  margin-top:5px;
}

th,td{
  border:1px solid #1e293b;
  padding:5px;
  text-align:center;
  font-size:13px;
}

.finance-done{
  text-decoration:line-through;
  color:#64748b;
}

</style>
</head>

<body>

<div id="app">

<!-- TAKVİM -->
<div class="panel">

<h2>📅 Takvim</h2>

<div id="months"></div>

<h3 id="monthTitle"></h3>

<div id="weekdays">
  <div>Pzt</div><div>Sal</div><div>Çar</div>
  <div>Per</div><div>Cum</div><div>Cts</div><div>Paz</div>
</div>

<div id="days"></div>

<h3>Not</h3>

<textarea id="note" rows="4"></textarea>

<button onclick="saveNote()">Kaydet</button>

</div>

<!-- GÖREV -->
<div class="panel">

<h2>✅ Görevler</h2>

<input id="taskInput" placeholder="Yeni görev">
<button onclick="addTask()">+</button>

<div id="tasks"></div>

</div>

<!-- FİNANS -->
<div class="panel">

<h2>💰 Finans</h2>

<button onclick="addFinanceRow()">+ Satır</button>

<table>
<thead>
<tr>
<th>Sütun 1</th>
<th>Sütun 2</th>
<th>Sütun 3</th>
<th>Sütun 4</th>
<th>✔</th>
<th>❌</th>
</tr>
</thead>

<tbody id="financeBody"></tbody>

</table>

</div>

</div>


<script>

// ====== TAKVİM ======

let year=new Date().getFullYear()
let month=null
let day=null

const months=[
"Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
"Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"
]

const monthsDiv=document.getElementById("months")

months.forEach((m,i)=>{

  const d=document.createElement("div")
  d.className="month"
  d.innerText=m
  d.onclick=()=>openMonth(i)

  monthsDiv.appendChild(d)
})

function openMonth(m){

  month=m

  document.getElementById("monthTitle").innerText=
  months[m]+" "+year

  const daysDiv=document.getElementById("days")
  daysDiv.innerHTML=""

  const first=new Date(year,m,1).getDay()
  const start=(first+6)%7 // Pazartesi ayarı

  const total=new Date(year,m+1,0).getDate()

  for(let i=0;i<start;i++){
    daysDiv.appendChild(document.createElement("div"))
  }

  for(let i=1;i<=total;i++){

    const d=document.createElement("div")
    d.className="day"
    d.innerText=i

    d.onclick=()=>selectDay(i)

    const key=`${year}-${m}-${i}`

    if(localStorage.getItem(key)){
      const dot=document.createElement("div")
      dot.className="dot"
      d.appendChild(dot)
    }

    daysDiv.appendChild(d)
  }
}

function selectDay(d){

  day=d

  const key=`${year}-${month}-${d}`

  note.value=localStorage.getItem(key)||""
}

function saveNote(){

  if(day==null) return

  const key=`${year}-${month}-${day}`

  localStorage.setItem(key,note.value)

  openMonth(month)
}


// ====== GÖREV ======

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]")

function renderTasks(){

  const div=document.getElementById("tasks")
  div.innerHTML=""

  tasks.forEach((t,i)=>{

    const row=document.createElement("div")
    row.className="task"

    const span=document.createElement("span")
    span.innerText=t.text

    if(t.done) span.classList.add("done")

    span.onclick=()=>{
      t.done=!t.done
      saveTasks()
    }

    const del=document.createElement("button")
    del.innerText="X"

    del.onclick=()=>{
      tasks.splice(i,1)
      saveTasks()
    }

    row.appendChild(span)
    row.appendChild(del)

    div.appendChild(row)
  })
}

function addTask(){

  const input=taskInput

  if(input.value=="") return

  tasks.push({text:input.value,done:false})

  input.value=""

  saveTasks()
}

function saveTasks(){

  localStorage.setItem("tasks",JSON.stringify(tasks))
  renderTasks()
}


// ====== FİNANS ======

let finance=JSON.parse(localStorage.getItem("finance")||"[]")

function renderFinance(){

  const body=document.getElementById("financeBody")
  body.innerHTML=""

  finance.forEach((r,i)=>{

    const tr=document.createElement("tr")

    r.data.forEach(v=>{

      const td=document.createElement("td")
      td.contentEditable=true
      td.innerText=v

      if(r.done) td.classList.add("finance-done")

      td.oninput=()=>{
        r.data=[...tr.children]
        .slice(0,4)
        .map(x=>x.innerText)

        saveFinance()
      }

      tr.appendChild(td)
    })

    // DONE
    const ok=document.createElement("td")
    ok.innerText="✔"
    ok.style.cursor="pointer"

    ok.onclick=()=>{
      r.done=!r.done
      saveFinance()
    }

    // DEL
    const del=document.createElement("td")
    del.innerText="X"
    del.style.cursor="pointer"

    del.onclick=()=>{
      finance.splice(i,1)
      saveFinance()
    }

    tr.appendChild(ok)
    tr.appendChild(del)

    body.appendChild(tr)
  })
}

function addFinanceRow(){

  finance.push({
    data:["","","",""],
    done:false
  })

  saveFinance()
}

function saveFinance(){

  localStorage.setItem("finance",JSON.stringify(finance))
  renderFinance()
}


// ====== BAŞLAT ======

renderTasks()
renderFinance()

</script>

</body>
</html>
