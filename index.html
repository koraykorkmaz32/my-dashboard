<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#e5e7eb;
}

#app{
  display:grid;
  grid-template-columns:2fr 1fr 2fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

.panel{
  background:#020617;
  border-radius:8px;
  padding:10px;
  overflow:auto;
}

h2{
  border-bottom:1px solid #1e293b;
}

/* Takvim */

#months{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
}

.month{
  border:1px solid #1e293b;
  padding:6px;
  text-align:center;
  cursor:pointer;
}

.month:hover{background:#1e293b}

#weekdays,#days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
}

#days{gap:4px}

.day{
  border:1px solid #1e293b;
  height:50px;
  cursor:pointer;
  position:relative;
  font-size:13px;
}

.icon{
  position:absolute;
  bottom:2px;
  right:2px;
}

/* Input */

textarea,input{
  width:100%;
  background:#020617;
  color:white;
  border:1px solid #1e293b;
  margin:4px 0;
}

/* Button */

button{
  background:#2563eb;
  border:none;
  color:white;
  padding:4px 8px;
  cursor:pointer;
}

button:hover{background:#1d4ed8}

/* Task */

.task{
  display:flex;
  justify-content:space-between;
  margin:4px 0;
}

.done{
  text-decoration:line-through;
  color:#64748b;
}

/* Finance */

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border:1px solid #1e293b;
  padding:4px;
  font-size:12px;
}

.finance-done{
  text-decoration:line-through;
  color:#64748b;
}

</style>
</head>

<body>

<div id="app">

<!-- TAKVİM -->
<div class="panel">

<h2>📅 Takvim</h2>

<div id="months"></div>

<h3 id="monthTitle"></h3>

<div id="weekdays">
<div>Pzt</div><div>Sal</div><div>Çar</div>
<div>Per</div><div>Cum</div><div>Cts</div><div>Paz</div>
</div>

<div id="days"></div>

<select id="iconSelect">
<option>📌</option>
<option>💼</option>
<option>💰</option>
<option>❤️</option>
<option>⚠️</option>
</select>

<textarea id="note" rows="3"></textarea>

<button id="saveNoteBtn">Kaydet</button>

</div>

<!-- TASK -->
<div class="panel">

<h2>✅ Görevler</h2>

<input id="taskInput" placeholder="Yeni görev">
<button id="addTaskBtn">+</button>

<div id="tasks"></div>

</div>

<!-- FINANCE -->
<div class="panel">

<h2>💰 Finans</h2>

<button id="addFinanceBtn">+ Satır</button>

<table>
<thead>
<tr>
<th>1</th><th>2</th><th>3</th><th>4</th><th>✔</th><th>❌</th>
</tr>
</thead>

<tbody id="financeBody"></tbody>

</table>

</div>

</div>


<script>

// ===== GLOBAL =====

const year=new Date().getFullYear()

let currentMonth=null
let currentDay=null


// ===== TAKVİM =====

const months=[
"Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
"Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"
]

const monthsDiv=document.getElementById("months")
const daysDiv=document.getElementById("days")
const monthTitle=document.getElementById("monthTitle")
const note=document.getElementById("note")
const iconSelect=document.getElementById("iconSelect")

months.forEach((m,i)=>{

  const d=document.createElement("div")
  d.className="month"
  d.innerText=m

  d.addEventListener("click",()=>openMonth(i))

  monthsDiv.appendChild(d)
})


function openMonth(m){

  currentMonth=m
  currentDay=null

  monthTitle.innerText=months[m]+" "+year

  daysDiv.innerHTML=""

  const first=new Date(year,m,1).getDay()
  const start=(first+6)%7

  const total=new Date(year,m+1,0).getDate()

  for(let i=0;i<start;i++){
    daysDiv.appendChild(document.createElement("div"))
  }

  for(let d=1;d<=total;d++){

    const el=document.createElement("div")
    el.className="day"
    el.innerText=d

    el.addEventListener("click",()=>selectDay(d))

    const key=`${year}-${m}-${d}`
    const saved=localStorage.getItem(key)

    if(saved){

      const data=JSON.parse(saved)

      const icon=document.createElement("div")
      icon.className="icon"
      icon.innerText=data.icon

      el.appendChild(icon)
    }

    daysDiv.appendChild(el)
  }
}


function selectDay(d){

  currentDay=d

  const key=`${year}-${currentMonth}-${d}`

  const saved=localStorage.getItem(key)

  if(saved){

    const data=JSON.parse(saved)

    note.value=data.text
    iconSelect.value=data.icon

  }else{

    note.value=""
    iconSelect.value="📌"
  }
}


document.getElementById("saveNoteBtn")
.addEventListener("click",()=>{

  if(currentDay==null) return

  const key=`${year}-${currentMonth}-${currentDay}`

  const data={
    text:note.value,
    icon:iconSelect.value
  }

  localStorage.setItem(key,JSON.stringify(data))

  openMonth(currentMonth)
})


// ===== TASK =====

const taskInput=document.getElementById("taskInput")
const tasksDiv=document.getElementById("tasks")

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]")


function renderTasks(){

  tasksDiv.innerHTML=""

  tasks.forEach((t,i)=>{

    const row=document.createElement("div")
    row.className="task"

    const span=document.createElement("span")
    span.innerText=t.text

    if(t.done) span.classList.add("done")

    span.addEventListener("click",()=>{

      t.done=!t.done
      saveTasks()
    })

    const del=document.createElement("button")
    del.innerText="X"

    del.addEventListener("click",()=>{

      tasks.splice(i,1)
      saveTasks()
    })

    row.appendChild(span)
    row.appendChild(del)

    tasksDiv.appendChild(row)
  })
}


document.getElementById("addTaskBtn")
.addEventListener("click",()=>{

  if(taskInput.value=="") return

  tasks.push({
    text:taskInput.value,
    done:false
  })

  taskInput.value=""

  saveTasks()
})


function saveTasks(){

  localStorage.setItem("tasks",JSON.stringify(tasks))
  renderTasks()
}


// ===== FINANCE =====

const financeBody=document.getElementById("financeBody")

let finance=JSON.parse(localStorage.getItem("finance")||"[]")


function renderFinance(){

  financeBody.innerHTML=""

  finance.forEach((r,i)=>{

    const tr=document.createElement("tr")

    r.data.forEach(v=>{

      const td=document.createElement("td")
      td.contentEditable=true
      td.innerText=v

      if(r.done) td.classList.add("finance-done")

      td.addEventListener("input",()=>{

        r.data=[...tr.children]
        .slice(0,4)
        .map(x=>x.innerText)

        saveFinance()
      })

      tr.appendChild(td)
    })


    const ok=document.createElement("td")
    ok.innerText="✔"

    ok.addEventListener("click",()=>{

      r.done=!r.done
      saveFinance()
    })


    const del=document.createElement("td")
    del.innerText="X"

    del.addEventListener("click",()=>{

      finance.splice(i,1)
      saveFinance()
    })

    tr.appendChild(ok)
    tr.appendChild(del)

    financeBody.appendChild(tr)
  })
}


document.getElementById("addFinanceBtn")
.addEventListener("click",()=>{

  finance.push({
    data:["","","",""],
    done:false
  })

  saveFinance()
})


function saveFinance(){

  localStorage.setItem("finance",JSON.stringify(finance))
  renderFinance()
}


// ===== START =====

renderTasks()
renderFinance()

</script>

</body>
</html>
