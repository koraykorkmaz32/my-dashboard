<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // 1. FIREBASE BİLGİLERİNİ BURAYA YAPIŞTIR
    const firebaseConfig = {
          apiKey: "AIzaSyDnvY1frFDXMbMspy8a-z_Z41ofSz8wu2k",
          authDomain: "korkmazdashboard.firebaseapp.com",
          databaseURL: "https://korkmazdashboard-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "korkmazdashboard",
          storageBucket: "korkmazdashboard.firebasestorage.app",
          messagingSenderId: "119430771116",
          appId: "1:119430771116:web:c7d25cfb8f320cbb940a09",
          measurementId: "G-87JCTF09T7"
        };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // 2. GÜVENLİK ANAHTARI
      let MY_KEY = localStorage.getItem('dash_key') || prompt("Dashboard Anahtarı:", "sef43");
      localStorage.setItem('dash_key', MY_KEY);
      const userPath = `users/${MY_KEY}/`;

      // --- AYARLAR ---
      window.toggleSettingsMenu = (e) => {
          e.stopPropagation();
          document.getElementById('settingsMenu').classList.toggle('active');
      };
      document.addEventListener('click', () => document.getElementById('settingsMenu').classList.remove('active'));

      window.updateModuleView = (modId, isChecked) => {
          update(ref(db, userPath + 'settings/modules'), { [modId]: isChecked });
      };

      onValue(ref(db, userPath + 'settings/modules'), (snap) => {
          const mods = snap.val() || { mod_weather:true, mod_pomodoro:true, mod_calendar:true, mod_stocks:true, mod_finance:true };
          Object.keys(mods).forEach(id => {
              const el = document.getElementById(id);
              const chk = document.getElementById('chk_' + id);
              if (el) {
                  mods[id] ? el.classList.remove('hidden') : el.classList.add('hidden');
                  if(chk) chk.checked = mods[id];
              }
          });
      });

      // --- DEĞİŞKENLER ---
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();
      let selectedDay = null;
      let selectedEmoji = "";
      const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

      // --- HAVA DURUMU ---
      async function updateWeather(lat, lon, city) {
          document.getElementById("cityName").innerText = city;
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,windspeed_10m&current_weather=true&timezone=auto`);
          const data = await res.json();
          document.getElementById("temp").innerText = `${data.current_weather.temperature}°C`;
          let html = "";
          for(let i=0; i<6; i++) {
              const time = data.hourly.time[i].split("T")[1];
              html += `<div class="weather-row"><span>${time}</span><b>${data.hourly.temperature_2m[i]}°</b><span>%${data.hourly.precipitation_probability[i]} 🌧️</span><span style="opacity:0.5">${data.hourly.windspeed_10m[i]}km/h</span></div>`;
          }
          document.getElementById("hourlyForecast").innerHTML = html;
      }

      window.searchCity = async () => {
          const city = document.getElementById("cityInput").value;
          const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=tr&format=json`);
          const data = await res.json();
          if (data.results) {
              const loc = data.results[0];
              update(ref(db, userPath + 'settings'), { city: loc.name, lat: loc.latitude, lon: loc.longitude });
          }
      };

      // --- BORSA (NİZAMİ) ---
      window.addStock = () => {
          const s = document.getElementById("stockSymbol").value.toUpperCase();
          const n = document.getElementById("stockNote").value;
          if(s) push(ref(db, userPath + 'stocks'), { symbol: s, note: n });
          document.getElementById("stockSymbol").value = ""; document.getElementById("stockNote").value = "";
      };
      onValue(ref(db, userPath + 'stocks'), (snap) => {
          const container = document.getElementById("stockList"); container.innerHTML = "";
          const data = snap.val();
          for (let id in data) {
              container.innerHTML += `
                <div class="item-row">
                    <div style="flex:1">
                        <div style="color:var(--accent); font-weight:700">${data[id].symbol}</div>
                        <div style="font-size:0.75rem; opacity:0.7; margin-top:2px">${data[id].note}</div>
                    </div>
                    <button class="del-btn" onclick="deleteItem('stocks/${id}')">×</button>
                </div>`;
          }
      });

      // --- TAKVİM (MERKEZ) ---
      window.openMonth = (m) => {
          currentMonth = m;
          document.getElementById("monthTitle").innerText = months[m] + " " + currentYear;
          const daysDiv = document.getElementById("days"); daysDiv.innerHTML = "";
          const firstDay = new Date(currentYear, m, 1).getDay();
          const offset = (firstDay === 0) ? 6 : firstDay - 1;
          for (let i = 0; i < offset; i++) daysDiv.innerHTML += `<div class="day empty"></div>`;
          for (let i = 1; i <= new Date(currentYear, m + 1, 0).getDate(); i++) {
              const d = document.createElement("div"); d.className = "day"; d.innerText = i;
              onValue(ref(db, userPath + `calendar/${currentYear}/${m}/${i}`), (snap) => {
                  if (snap.val()?.emoji) d.innerHTML = `${i}<span class="day-emoji">${snap.val().emoji}</span>`;
              });
              d.onclick = () => selectDay(i, d);
              daysDiv.appendChild(d);
          }
      };
      window.selectDay = (d, el) => {
          selectedDay = d; document.querySelectorAll('.day').forEach(x => x.classList.remove('selected')); el.classList.add('selected');
          onValue(ref(db, userPath + `calendar/${currentYear}/${currentMonth}/${d}`), (snap) => {
              const data = snap.val() || {}; document.getElementById("note").value = data.text || "";
              selectedEmoji = data.emoji || ""; document.getElementById("selectedDateText").innerText = `${d} ${months[currentMonth]}`;
          }, { onlyOnce: true });
      };
      window.saveNote = () => { if(selectedDay) set(ref(db, userPath + `calendar/${currentYear}/${currentMonth}/${selectedDay}`), { text: document.getElementById("note").value, emoji: selectedEmoji }); };

      // --- FİNANS & YARDIMCI ---
      window.addFinance = () => {
          const val = document.getElementById("financeInput").value;
          if(val) push(ref(db, userPath + 'finances'), { text: val });
          document.getElementById("financeInput").value = "";
      };
      onValue(ref(db, userPath + 'finances'), (snap) => {
          const container = document.getElementById("finances"); container.innerHTML = "";
          let total = 0; const data = snap.val();
          for (let id in data) {
              container.innerHTML += `<div class="item-row"><span>${data[id].text}</span><button class="del-btn" onclick="deleteItem('finances/${id}')">×</button></div>`;
              const amount = data[id].text.match(/\d+/g);
              if (amount) total += parseInt(amount[amount.length - 1]);
          }
          document.getElementById("totalFinance").innerText = `Toplam: ${total} TL`;
      });

      // POMODORO
      let timer; let timeLeft = 25 * 60;
      window.toggleTimer = () => {
          if (timer) { clearInterval(timer); timer = null; document.getElementById("timerBtn").innerText = "Başlat"; }
          else { timer = setInterval(() => { timeLeft--; updateTimerDisplay(); }, 1000); document.getElementById("timerBtn").innerText = "Durdur"; }
      };
      window.resetTimer = () => { clearInterval(timer); timer = null; timeLeft = 25 * 60; updateTimerDisplay(); document.getElementById("timerBtn").innerText = "Başlat"; };
      function updateTimerDisplay() {
          const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
          document.getElementById("timerDisplay").innerText = `${m}:${s < 10 ? '0'+s : s}`;
      }

      window.deleteItem = (p) => remove(ref(db, userPath + p));
      window.setEmoji = (e) => { selectedEmoji = e; };

      onValue(ref(db, userPath + 'settings'), (snap) => {
          const data = snap.val() || { userName: "Şef", city: "Istanbul", lat: 41.0082, lon: 28.9784 };
          document.getElementById("greeting").innerText = `Selam, ${data.userName}!`;
          updateWeather(data.lat, data.lon, data.city);
      });

      // BAŞLAT
      const monthsDiv = document.getElementById("months");
      months.forEach((m, i) => {
          const div = document.createElement("div"); div.className = "month"; div.innerText = m;
          div.onclick = () => { document.querySelectorAll('.month').forEach(el => el.classList.remove('active')); div.classList.add('active'); openMonth(i); };
          monthsDiv.appendChild(div);
      });
      openMonth(currentMonth);
      updateTimerDisplay();
      lucide.createIcons();
    </script>

    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; --text: #f8fafc; }
        body { 
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text);
            background-image: radial-gradient(at 0% 0%, rgba(56,189,248,0.1) 0, transparent 40%);
            min-height: 100vh; padding: 20px;
        }
        #app { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; max-width: 1600px; margin: auto; }
        .panel { background: var(--card); backdrop-filter: blur(20px); border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }

        /* NİZAMİ AYARLAR */
        .settings-drawer { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .settings-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); cursor:pointer; color:var(--accent); display:flex; align-items:center; justify-content:center; }
        .settings-menu { 
            display:none; position:absolute; right:0; top:55px; background: #0f172a; 
            border: 1px solid var(--accent); padding:20px; border-radius:20px; width:220px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .settings-menu.active { display:block; }
        .settings-menu label { display:flex; align-items:center; justify-content:space-between; margin: 15px 0; font-size: 0.8rem; cursor:pointer; }

        /* HİSSE NOTLARI DÜZENİ */
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.02); }

        /* TAKVİM DÜZENİ */
        #months { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 15px; }
        .month { font-size: 0.6rem; padding: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; text-align: center; }
        .month.active { background: var(--accent); color: #000; font-weight: 700; }
        #days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: rgba(255,255,255,0.02); cursor: pointer; font-size: 0.8rem; position: relative; }
        .day.selected { background: var(--accent); color: #000; font-weight: 700; }
        .day-emoji { position: absolute; bottom: 2px; right: 2px; font-size: 0.6rem; }

        /* HAVA DURUMU DÜZENİ */
        .weather-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.8rem; }

        h2 { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        input, textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 14px; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .del-btn { background: transparent; color: #ef4444; font-size: 1.2rem; cursor: pointer; border: none; }

        @media (max-width: 1100px) { #app { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="settings-drawer">
    <button class="settings-btn" onclick="toggleSettingsMenu(event)"><i data-lucide="settings"></i></button>
    <div class="settings-menu" id="settingsMenu">
        <b style="font-size:0.7rem; color:var(--accent)">GÖRÜNÜM AYARLARI</b>
        <label>Hava Durumu <input type="checkbox" id="chk_mod_weather" onchange="updateModuleView('mod_weather', this.checked)"></label>
        <label>Pomodoro <input type="checkbox" id="chk_mod_pomodoro" onchange="updateModuleView('mod_pomodoro', this.checked)"></label>
        <label>Borsa Takip <input type="checkbox" id="chk_mod_stocks" onchange="updateModuleView('mod_stocks', this.checked)"></label>
        <label>Takvim <input type="checkbox" id="chk_mod_calendar" onchange="updateModuleView('mod_calendar', this.checked)"></label>
        <label>Nakit Akışı <input type="checkbox" id="chk_mod_finance" onchange="updateModuleView('mod_finance', this.checked)"></label>
    </div>
</div>

<div id="app">
    <div style="display:flex; flex-direction:column; gap:20px">
        <div class="panel">
            <h1 id="greeting" style="margin:0; font-size:1.4rem">Selam!</h1>
        </div>
        <div class="panel" id="mod_weather">
            <h2><i data-lucide="cloud"></i> <span id="cityName">Şehir</span></h2>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <span id="temp" style="font-size:2.5rem; font-weight:800">--°C</span>
                <div style="display:flex; gap:5px"><input id="cityInput" placeholder="Şehir..." style="width:70px"><button onclick="searchCity()"><i data-lucide="search" size="14"></i></button></div>
            </div>
            <div id="hourlyForecast"></div>
        </div>
        <div class="panel" id="mod_pomodoro">
            <h2><i data-lucide="timer"></i> Odaklanma</h2>
            <div style="text-align:center">
                <div id="timerDisplay" style="font-size:2.8rem; font-weight:800; margin-bottom:10px">25:00</div>
                <button id="timerBtn" onclick="toggleTimer()">Başlat</button>
                <button onclick="resetTimer()" style="background:rgba(255,255,255,0.1); color:#fff; margin-left:5px">Sıfırla</button>
            </div>
        </div>
    </div>

    <div class="panel" id="mod_calendar">
        <h2><i data-lucide="calendar"></i> Takvim & Günlük Notlar</h2>
        <div id="months"></div>
        <h3 id="monthTitle" style="text-align:center; font-size:1rem; margin:15px 0"></h3>
        <div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; font-size:0.65rem; opacity:0.5; margin-bottom:10px; font-weight:700">
            <span>PT</span><span>SA</span><span>ÇA</span><span>PE</span><span>CU</span><span>CT</span><span>PZ</span>
        </div>
        <div id="days"></div>
        <div style="margin-top:25px; background:rgba(255,255,255,0.03); padding:20px; border-radius:24px; border: 1px solid rgba(255,255,255,0.03)">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <span id="selectedDateText" style="font-weight:700; font-size:0.9rem">Gün Seçin</span>
                <div style="display:flex; gap:10px">
                    <button onclick="setEmoji('✅')" style="background:none; padding:0">✅</button>
                    <button onclick="setEmoji('🚀')" style="background:none; padding:0">🚀</button>
                    <button onclick="setEmoji('💰')" style="background:none; padding:0">💰</button>
                    <button onclick="setEmoji('')" style="background:none; padding:0; font-size:0.7rem; opacity:0.5">✕</button>
                </div>
            </div>
            <textarea id="note" placeholder="Bugün neler oldu? Stratejin ne?" style="height:100px"></textarea>
            <button onclick="saveNote()" style="width:100%; margin-top:15px; padding:15px">Notu Buluta Kaydet</button>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:20px">
        <div class="panel" id="mod_stocks">
            <h2><i data-lucide="trending-up"></i> Borsa Notlarım</h2>
            <div id="stockList" style="max-height:300px; overflow-y:auto"></div>
            <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px">
                <input id="stockSymbol" placeholder="Hisse Kodu (ISBTR)">
                <textarea id="stockNote" placeholder="Destek, direnç, hedef..." style="height:60px"></textarea>
                <button onclick="addStock()">Portföye Ekle</button>
            </div>
        </div>
        <div class="panel" id="mod_finance">
            <h2><i data-lucide="wallet"></i> Nakit Akışı</h2>
            <div id="finances" style="max-height:200px; overflow-y:auto"></div>
            <div id="totalFinance" style="text-align:right; font-weight:800; color:var(--accent); font-size:1.1rem; margin-top:10px">0 TL</div>
            <div style="display:flex; gap:8px; margin-top:15px"><input id="financeInput" placeholder="Market 150"><button onclick="addFinance()">+</button></div>
        </div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
