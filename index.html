<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kişisel Dashboard</title>

<style>

body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#e5e7eb;
}

#app{
  display:grid;
  grid-template-columns: 2fr 1fr 2fr;
  height:100vh;
  gap:10px;
  padding:10px;
}

.panel{
  background:#020617;
  border-radius:10px;
  padding:10px;
  overflow:auto;
}

h2{
  border-bottom:1px solid #1e293b;
}

/* TAKVİM */

#months{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:5px;
}

.month{
  border:1px solid #1e293b;
  text-align:center;
  padding:8px;
  cursor:pointer;
}

.month:hover{background:#1e293b}

#weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  text-align:center;
  font-size:12px;
}

#days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.day{
  border:1px solid #1e293b;
  height:60px;
  position:relative;
  cursor:pointer;
  padding-top:5px;
}

.icon{
  position:absolute;
  bottom:4px;
  right:4px;
  font-size:14px;
}

/* TEXT */

textarea{
  width:100%;
  background:#020617;
  color:white;
  border:1px solid #1e293b;
}

/* BUTTON */

button{
  background:#2563eb;
  border:none;
  color:white;
  padding:4px 8px;
  cursor:pointer;
}

button:hover{background:#1d4ed8}

/* TASK */

.task{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.done{
  text-decoration:line-through;
  color:#64748b;
}

/* FINANCE */

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  border:1px solid #1e293b;
  padding:5px;
  font-size:13px;
  text-align:center;
}

.finance-done{
  text-decoration:line-through;
  color:#64748b;
}

select{
  width:100%;
  background:#020617;
  color:white;
  border:1px solid #1e293b;
}

</style>
</head>

<body>

<div id="app">

<!-- TAKVİM -->
<div class="panel">

<h2>📅 Takvim</h2>

<div id="months"></div>

<h3 id="monthTitle"></h3>

<div id="weekdays">
<div>Pzt</div><div>Sal</div><div>Çar</div>
<div>Per</div><div>Cum</div><div>Cts</div><div>Paz</div>
</div>

<div id="days"></div>

<h3>Not</h3>

<select id="iconSelect">
  <option value="📌">📌 Genel</option>
  <option value="💼">💼 İş</option>
  <option value="💰">💰 Para</option>
  <option value="❤️">❤️ Özel</option>
  <option value="⚠️">⚠️ Acil</option>
</select>

<textarea id="note" rows="4"></textarea>

<button onclick="saveNote()">Kaydet</button>

</div>


<!-- GÖREV -->
<div class="panel">

<h2>✅ Görevler</h2>

<input id="taskInput">
<button onclick="addTask()">+</button>

<div id="tasks"></div>

</div>


<!-- FİNANS -->
<div class="panel">

<h2>💰 Finans</h2>

<button onclick="addFinanceRow()">+ Satır</button>

<table>
<thead>
<tr>
<th>Sütun1</th>
<th>Sütun2</th>
<th>Sütun3</th>
<th>Sütun4</th>
<th>✔</th>
<th>❌</th>
</tr>
</thead>

<tbody id="financeBody"></tbody>

</table>

</div>

</div>


<script>

// ===== TAKVİM =====

let year=new Date().getFullYear()
let month=null
let day=null

const months=[
"Ocak","Şubat","Mart","Nisan","Mayıs","Haziran",
"Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"
]

const monthsDiv=document.getElementById("months")

months.forEach((m,i)=>{

  const d=document.createElement("div")
  d.className="month"
  d.innerText=m
  d.onclick=()=>openMonth(i)

  monthsDiv.appendChild(d)
})


function openMonth(m){

  month=m

  monthTitle.innerText=months[m]+" "+year

  days.innerHTML=""

  const first=new Date(year,m,1).getDay()
  const start=(first+6)%7

  const total=new Date(year,m+1,0).getDate()

  for(let i=0;i<start;i++){
    days.appendChild(document.createElement("div"))
  }

  for(let i=1;i<=total;i++){

    const d=document.createElement("div")
    d.className="day"
    d.innerText=i

    d.onclick=()=>selectDay(i)

    const key=`${year}-${m}-${i}`

    const saved=localStorage.getItem(key)

    if(saved){

      const data=JSON.parse(saved)

      const icon=document.createElement("div")
      icon.className="icon"
      icon.innerText=data.icon

      d.appendChild(icon)
    }

    days.appendChild(d)
  }
}


function selectDay(d){

  day=d

  const key=`${year}-${month}-${d}`

  const saved=localStorage.getItem(key)

  if(saved){

    const data=JSON.parse(saved)

    note.value=data.text
    iconSelect.value=data.icon

  }else{

    note.value=""
    iconSelect.value="📌"
  }
}


function saveNote(){

  if(day==null) return

  const key=`${year}-${month}-${day}`

  const data={
    text:note.value,
    icon:iconSelect.value
  }

  localStorage.setItem(key,JSON.stringify(data))

  openMonth(month)
}


// ===== TASK =====

let tasks=JSON.parse(localStorage.getItem("tasks")||"[]")

function renderTasks(){

  tasksDiv.innerHTML=""

  tasks.forEach((t,i)=>{

    const row=document.createElement("div")
    row.className="task"

    const span=document.createElement("span")
    span.innerText=t.text

    if(t.done) span.classList.add("done")

    span.onclick=()=>{
      t.done=!t.done
      saveTasks()
    }

    const del=document.createElement("button")
    del.innerText="X"

    del.onclick=()=>{
      tasks.splice(i,1)
      saveTasks()
    }

    row.appendChild(span)
    row.appendChild(del)

    tasksDiv.appendChild(row)
  })
}


function addTask(){

  if(taskInput.value=="") return

  tasks.push({
    text:taskInput.value,
    done:false
  })

  taskInput.value=""

  saveTasks()
}


function saveTasks(){

  localStorage.setItem("tasks",JSON.stringify(tasks))
  renderTasks()
}


// ===== FINANCE =====

let finance=JSON.parse(localStorage.getItem("finance")||"[]")


function renderFinance(){

  financeBody.innerHTML=""

  finance.forEach((r,i)=>{

    const tr=document.createElement("tr")

    r.data.forEach(v=>{

      const td=document.createElement("td")
      td.contentEditable=true
      td.innerText=v

      if(r.done) td.classList.add("finance-done")

      td.oninput=()=>{

        r.data=[...tr.children]
        .slice(0,4)
        .map(x=>x.innerText)

        saveFinance()
      }

      tr.appendChild(td)
    })


    const ok=document.createElement("td")
    ok.innerText="✔"
    ok.onclick=()=>{
      r.done=!r.done
      saveFinance()
    }


    const del=document.createElement("td")
    del.innerText="X"
    del.onclick=()=>{
      finance.splice(i,1)
      saveFinance()
    }

    tr.appendChild(ok)
    tr.appendChild(del)

    financeBody.appendChild(tr)
  })
}


function addFinanceRow(){

  finance.push({
    data:["","","",""],
    done:false
  })

  saveFinance()
}


function saveFinance(){

  localStorage.setItem("finance",JSON.stringify(finance))
  renderFinance()
}


// ===== START =====

renderTasks()
renderFinance()

</script>

</body>
</html>
