<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Pro Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, onValue, push, remove, update, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // 1. FIREBASE CONFIG (Kendi bilgilerin kalsın)
     const firebaseConfig = {
          apiKey: "AIzaSyDnvY1frFDXMbMspy8a-z_Z41ofSz8wu2k",
          authDomain: "korkmazdashboard.firebaseapp.com",
          databaseURL: "https://korkmazdashboard-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "korkmazdashboard",
          storageBucket: "korkmazdashboard.firebasestorage.app",
          messagingSenderId: "119430771116",
          appId: "1:119430771116:web:c7d25cfb8f320cbb940a09",
          measurementId: "G-87JCTF09T7"
        };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const auth = getAuth(app);
      let userPath = "";

      // --- AUTH ---
      window.handleLogin = () => {
          const email = document.getElementById("email").value;
          const pass = document.getElementById("pass").value;
          signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Hata: " + err.message));
      };
      window.handleRegister = () => {
          const email = document.getElementById("email").value;
          const pass = document.getElementById("pass").value;
          createUserWithEmailAndPassword(auth, email, pass).catch(err => alert("Hata: " + err.message));
      };
      window.handleLogout = () => signOut(auth);

      onAuthStateChanged(auth, (user) => {
          if (user) {
              userPath = `users/${user.uid}/`;
              document.getElementById("loginScreen").style.display = "none";
              document.getElementById("app").style.display = "grid";
              initDashboard();
          } else {
              document.getElementById("loginScreen").style.display = "flex";
              document.getElementById("app").style.display = "none";
          }
      });

      function initDashboard() {
          loadSettings();
          openMonth(new Date().getMonth());
          renderStocks();
          renderFinance();
          renderTasks();
          renderAlerts();
          updateTimerDisplay();
          lucide.createIcons();
      }

      // --- AYARLAR ---
      window.toggleSettingsMenu = (e) => { e.stopPropagation(); document.getElementById('settingsMenu').classList.toggle('active'); };
      document.addEventListener('click', () => document.getElementById('settingsMenu').classList.remove('active'));
      window.updateModuleView = (modId, isChecked) => update(ref(db, userPath + 'settings/modules'), { [modId]: isChecked });

      function loadSettings() {
          onValue(ref(db, userPath + 'settings/modules'), (snap) => {
              const mods = snap.val() || { mod_weather:true, mod_pomodoro:true, mod_calendar:true, mod_stocks:true, mod_finance:true, mod_tasks:true, mod_alerts:true };
              Object.keys(mods).forEach(id => {
                  const el = document.getElementById(id);
                  if (el) mods[id] ? el.classList.remove('hidden') : el.classList.add('hidden');
                  if(document.getElementById('chk_'+id)) document.getElementById('chk_'+id).checked = mods[id];
              });
          });
          onValue(ref(db, userPath + 'settings'), (snap) => {
              const data = snap.val() || { userName: "Şef", city: "Istanbul", lat: 41.0082, lon: 28.9784 };
              document.getElementById("greeting").innerText = `Selam, ${data.userName}!`;
              document.getElementById("userNameInput").value = data.userName;
              updateWeather(data.lat, data.lon, data.city);
          });
      }

      // --- HAVA DURUMU (GÜNCEL SAAT + SCROLL) ---
      async function updateWeather(lat, lon, city) {
          document.getElementById("cityName").innerText = city;
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,windspeed_10m&current_weather=true&timezone=auto`);
          const data = await res.json();
          document.getElementById("temp").innerText = `${data.current_weather.temperature}°C`;
          
          const currentHour = new Date().getHours();
          let html = "";
          // Mevcut saatten itibaren 24 saatlik döngü
          for(let i = currentHour; i < currentHour + 24; i++) {
              const time = data.hourly.time[i].split("T")[1];
              html += `
                <div class="weather-item">
                    <span class="w-time">${time}</span>
                    <b class="w-temp">${data.hourly.temperature_2m[i]}°</b>
                    <span class="w-rain">%${data.hourly.precipitation_probability[i]} 🌧️</span>
                    <span class="w-wind">${data.hourly.windspeed_10m[i]} <small>km/h</small></span>
                </div>`;
          }
          document.getElementById("hourlyForecast").innerHTML = html;
      }

      window.searchCity = async () => {
          const city = document.getElementById("cityInput").value;
          const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=tr&format=json`);
          const data = await res.json();
          if (data.results) {
              const loc = data.results[0];
              update(ref(db, userPath + 'settings'), { city: loc.name, lat: loc.latitude, lon: loc.longitude });
          }
      };

      // --- TAKVİM (ÇOKLU NOT & EMOJI SİSTEMİ) ---
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();
      let selectedDay = null;
      let selectedEmoji = "";
      const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

      window.openMonth = (m) => {
          currentMonth = m;
          document.getElementById("monthTitle").innerText = months[m] + " " + currentYear;
          const daysDiv = document.getElementById("days"); daysDiv.innerHTML = "";
          const firstDay = new Date(currentYear, m, 1).getDay();
          const offset = (firstDay === 0) ? 6 : firstDay - 1;
          for (let i = 0; i < offset; i++) daysDiv.innerHTML += `<div class="day empty"></div>`;
          for (let i = 1; i <= new Date(currentYear, m + 1, 0).getDate(); i++) {
              const d = document.createElement("div"); d.className = "day"; d.innerText = i;
              onValue(ref(db, userPath + `calendar/${currentYear}/${m}/${i}`), (snap) => {
                  const dayData = snap.val();
                  if (dayData) {
                      let emojis = "";
                      Object.values(dayData).forEach(note => { if(note.emoji) emojis += note.emoji; });
                      d.innerHTML = `${i}<span class="day-emoji">${emojis}</span>`;
                  }
              });
              d.onclick = () => window.selectDay(i, d);
              daysDiv.appendChild(d);
          }
      };

      window.selectDay = (d, el) => {
          selectedDay = d; document.querySelectorAll('.day').forEach(x => x.classList.remove('selected')); el.classList.add('selected');
          document.getElementById("selectedDateText").innerText = `${d} ${months[currentMonth]}`;
          renderDayNotes();
      };

      function renderDayNotes() {
          onValue(ref(db, userPath + `calendar/${currentYear}/${currentMonth}/${selectedDay}`), (snap) => {
              const container = document.getElementById("dayNotesList");
              container.innerHTML = "";
              const notes = snap.val();
              if (notes) {
                  Object.keys(notes).forEach(id => {
                      container.innerHTML += `
                        <div class="item-row">
                            <span>${notes[id].emoji || ''} ${notes[id].text}</span>
                            <button class="del-btn" onclick="window.deleteItem('calendar/${currentYear}/${currentMonth}/${selectedDay}/${id}')">×</button>
                        </div>`;
                  });
              }
          });
      }

      window.saveNote = () => {
          if(!selectedDay) return alert("Önce gün seç!");
          const text = document.getElementById("noteInput").value;
          if(!text) return;
          push(ref(db, userPath + `calendar/${currentYear}/${currentMonth}/${selectedDay}`), { text: text, emoji: selectedEmoji });
          document.getElementById("noteInput").value = "";
      };

      // --- BORSA, GÖREV, FİNANS (DOKUNULMADI) ---
      window.addStock = () => {
          const s = document.getElementById("stockSymbol").value.toUpperCase();
          const n = document.getElementById("stockNote").value;
          if(s) push(ref(db, userPath + 'stocks'), { symbol: s, note: n });
          document.getElementById("stockSymbol").value = ""; document.getElementById("stockNote").value = "";
      };
      function renderStocks() {
          onValue(ref(db, userPath + 'stocks'), (snap) => {
              const container = document.getElementById("stockList"); container.innerHTML = "";
              const data = snap.val();
              for (let id in data) container.innerHTML += `<div class="item-row"><div><b>${data[id].symbol}</b><br><small>${data[id].note}</small></div><button class="del-btn" onclick="window.deleteItem('stocks/${id}')">×</button></div>`;
          });
      }

      window.addTask = () => {
          const val = document.getElementById("taskInput").value;
          if(val) push(ref(db, userPath + 'tasks'), { text: val, done: false });
          document.getElementById("taskInput").value = "";
      };
      function renderTasks() {
          onValue(ref(db, userPath + 'tasks'), (snap) => {
              const container = document.getElementById("taskList"); container.innerHTML = "";
              const data = snap.val();
              for (let id in data) container.innerHTML += `<div class="item-row"><span class="${data[id].done ? 'done' : ''}" onclick="window.toggleTask('${id}', ${data[id].done})">${data[id].text}</span><button class="del-btn" onclick="window.deleteItem('tasks/${id}')">×</button></div>`;
          });
      }
      window.toggleTask = (id, done) => update(ref(db, userPath + 'tasks/' + id), { done: !done });

      window.addFinance = () => {
          const val = document.getElementById("financeInput").value;
          if(val) push(ref(db, userPath + 'finances'), { text: val });
          document.getElementById("financeInput").value = "";
      };
      function renderFinance() {
          onValue(ref(db, userPath + 'finances'), (snap) => {
              const container = document.getElementById("finances"); container.innerHTML = "";
              let total = 0; const data = snap.val();
              for (let id in data) {
                  container.innerHTML += `<div class="item-row"><span>${data[id].text}</span><button class="del-btn" onclick="window.deleteItem('finances/${id}')">×</button></div>`;
                  const amount = data[id].text.match(/\d+/g);
                  if (amount) total += parseInt(amount[amount.length - 1]);
              }
              document.getElementById("totalFinance").innerText = `Toplam: ${total} TL`;
          });
      }

      function renderAlerts() {
          onValue(query(ref(db, userPath + 'alerts'), limitToLast(5)), (snap) => {
              const container = document.getElementById("alertList"); container.innerHTML = "";
              const data = snap.val();
              for (let id in data) container.innerHTML = `<div class="item-row alert-row"><b>⚠️ ${data[id].symbol || 'Sinyal'}</b><span>${data[id].message || data[id]}</span></div>` + container.innerHTML;
          });
      }

      // --- POMODORO & YARDIMCILAR ---
      let timer; let timeLeft = 25 * 60;
      window.toggleTimer = () => { if (timer) { clearInterval(timer); timer = null; } else { timer = setInterval(() => { timeLeft--; updateTimerDisplay(); }, 1000); } };
      window.resetTimer = () => { clearInterval(timer); timer = null; timeLeft = 25 * 60; updateTimerDisplay(); };
      function updateTimerDisplay() { document.getElementById("timerDisplay").innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`; }

      window.deleteItem = (p) => remove(ref(db, userPath + p));
      window.saveName = () => set(ref(db, userPath + 'settings/userName'), document.getElementById("userNameInput").value);
      window.setEmoji = (e) => { selectedEmoji = e; };
      window.clearAlerts = () => remove(ref(db, userPath + 'alerts'));

      window.onload = () => {
          const monthsDiv = document.getElementById("months");
          months.forEach((m, i) => {
              const div = document.createElement("div"); div.className = "month"; div.innerText = m;
              div.onclick = () => { document.querySelectorAll('.month').forEach(el => el.classList.remove('active')); div.classList.add('active'); openMonth(i); };
              monthsDiv.appendChild(div);
          });
      }
    </script>

    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; }
        .login-card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 320px; text-align: center; }
        
        /* DASHBOARD */
        #app { display: none; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; max-width: 1600px; margin: auto; padding: 20px; }
        .panel { background: var(--card); backdrop-filter: blur(20px); border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }

        /* HAVA DURUMU SCROLL */
        #hourlyForecast { 
            display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: thin; 
            scrollbar-color: var(--accent) transparent;
        }
        .weather-item { 
            min-width: 80px; text-align: center; background: rgba(255,255,255,0.03); 
            padding: 12px; border-radius: 16px; display: flex; flex-direction: column; gap: 5px;
        }
        .w-time { font-size: 0.7rem; opacity: 0.6; }
        .w-temp { font-size: 1rem; color: #fff; }
        .w-rain { font-size: 0.7rem; color: var(--accent); }
        .w-wind { font-size: 0.6rem; opacity: 0.5; }

        /* TAKVİM */
        #months { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 10px; }
        .month { font-size: 0.6rem; padding: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; text-align: center; }
        .month.active { background: var(--accent); color: #000; font-weight: 700; }
        #days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 10px; background: rgba(255,255,255,0.02); cursor: pointer; font-size: 0.8rem; position: relative; }
        .day.selected { background: var(--accent); color: #000; font-weight: 700; border: 2px solid #fff; }
        .day-emoji { display: block; font-size: 0.6rem; margin-top: 2px; }

        /* GENEL */
        h2 { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 8px; font-size: 0.85rem; }
        input, textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .del-btn { background: transparent; color: #ef4444; font-size: 1.2rem; border: none; cursor: pointer; }
        .done { text-decoration: line-through; opacity: 0.4; }

        /* AYARLAR */
        .settings-drawer { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .settings-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); cursor:pointer; color:var(--accent); display:flex; align-items:center; justify-content:center; }
        .settings-menu { display:none; position:absolute; right:0; top:55px; background: #0f172a; border: 1px solid var(--accent); padding:20px; border-radius:20px; width:220px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .settings-menu.active { display:block; }
        .settings-menu label { display:flex; align-items:center; justify-content:space-between; margin: 12px 0; font-size: 0.8rem; cursor:pointer; }

        @media (max-width: 1100px) { #app { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h1 style="font-size: 1.5rem; margin-bottom: 20px;">Life OS Login</h1>
        <input id="email" type="email" placeholder="E-posta">
        <input id="pass" type="password" placeholder="Şifre">
        <div style="display:flex; gap:10px; margin-top:10px">
            <button onclick="window.handleLogin()" style="flex:1">Giriş Yap</button>
            <button onclick="window.handleRegister()" style="flex:1; background:rgba(255,255,255,0.1); color:#fff">Kayıt Ol</button>
        </div>
    </div>
</div>

<div class="settings-drawer">
    <button class="settings-btn" onclick="window.toggleSettingsMenu(event)"><i data-lucide="settings"></i></button>
    <div class="settings-menu" id="settingsMenu">
        <b style="font-size:0.7rem; color:var(--accent)">MODÜL AYARLARI</b>
        <label>Hava Durumu <input type="checkbox" id="chk_mod_weather" onchange="window.updateModuleView('mod_weather', this.checked)"></label>
        <label>Pomodoro <input type="checkbox" id="chk_mod_pomodoro" onchange="window.updateModuleView('mod_pomodoro', this.checked)"></label>
        <label>Borsa <input type="checkbox" id="chk_mod_stocks" onchange="window.updateModuleView('mod_stocks', this.checked)"></label>
        <label>Finans <input type="checkbox" id="chk_mod_finance" onchange="window.updateModuleView('mod_finance', this.checked)"></label>
        <label>Görevler <input type="checkbox" id="chk_mod_tasks" onchange="window.updateModuleView('mod_tasks', this.checked)"></label>
        <button onclick="window.handleLogout()" style="width:100%; margin-top:15px; background:#ef4444; color:#fff">Çıkış Yap</button>
    </div>
</div>

<div id="app">
    <div style="display:flex; flex-direction:column; gap:20px">
        <div class="panel">
            <h1 id="greeting" style="margin:0; font-size:1.4rem">Selam!</h1>
            <input id="userNameInput" onchange="window.saveName()" placeholder="Adın..." style="margin-top:10px; font-size:0.8rem">
        </div>
        <div class="panel" id="mod_weather">
            <h2><i data-lucide="cloud"></i> <span id="cityName">Şehir</span></h2>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <span id="temp" style="font-size:2.5rem; font-weight:800">--°C</span>
                <div style="display:flex; gap:5px"><input id="cityInput" placeholder="Şehir..." style="width:70px; margin:0"><button onclick="window.searchCity()"><i data-lucide="search" size="14"></i></button></div>
            </div>
            <div id="hourlyForecast"></div>
        </div>
        <div class="panel" id="mod_pomodoro">
            <h2><i data-lucide="timer"></i> Odaklanma</h2>
            <div style="text-align:center">
                <div id="timerDisplay" style="font-size:2.5rem; font-weight:800; margin-bottom:10px">25:00</div>
                <button onclick="window.toggleTimer()">Başlat/Durdur</button>
                <button onclick="window.resetTimer()" style="background:rgba(255,255,255,0.1); color:#fff; margin-left:5px">Sıfırla</button>
            </div>
        </div>
    </div>

    <div class="panel" id="mod_calendar">
        <h2><i data-lucide="calendar"></i> Takvim</h2>
        <div id="months"></div>
        <h3 id="monthTitle" style="text-align:center; font-size:1rem; margin:15px 0"></h3>
        <div style="display:grid; grid-template-columns: repeat(7, 1fr); text-align:center; font-size:0.65rem; opacity:0.5; margin-bottom:10px; font-weight:700">
            <span>PT</span><span>SA</span><span>ÇA</span><span>PE</span><span>CU</span><span>CT</span><span>PZ</span>
        </div>
        <div id="days"></div>
        <div style="margin-top:25px; background:rgba(255,255,255,0.03); padding:20px; border-radius:24px; border: 1px solid rgba(255,255,255,0.05)">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                <span id="selectedDateText" style="font-weight:700">Gün Seçin</span>
                <div>
                    <button onclick="window.setEmoji('✅')" style="background:none; padding:0">✅</button>
                    <button onclick="window.setEmoji('🚀')" style="background:none; padding:0">🚀</button>
                    <button onclick="window.setEmoji('💰')" style="background:none; padding:0">💰</button>
                    <button onclick="window.setEmoji('⚽')" style="background:none; padding:0">⚽</button>
                    <button onclick="window.setEmoji('🎹')" style="background:none; padding:0">🎹</button>
                    <button onclick="window.setEmoji('')" style="background:none; padding:0; opacity:0.5">✕</button>
                </div>
            </div>
            
            <div id="dayNotesList" style="margin-bottom: 15px; max-height: 150px; overflow-y: auto;"></div>
            
            <div style="display:flex; gap:10px">
                <input id="noteInput" placeholder="Yeni not ekle..." style="margin:0">
                <button onclick="window.saveNote()">Ekle</button>
            </div>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:20px">
        <div class="panel" id="mod_alerts">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <h2 style="margin:0"><i data-lucide="bell"></i> Alarmlar</h2>
                <button onclick="window.clearAlerts()" style="font-size:0.6rem">Temizle</button>
            </div>
            <div id="alertList" style="max-height:150px; overflow-y:auto"></div>
        </div>
        <div class="panel" id="mod_stocks">
            <h2><i data-lucide="trending-up"></i> Borsa Notlarım</h2>
            <div id="stockList" style="max-height:150px; overflow-y:auto"></div>
            <input id="stockSymbol" placeholder="Hisse (ISBTR)">
            <textarea id="stockNote" placeholder="Strateji notun..." style="height:60px"></textarea>
            <button onclick="window.addStock()" style="width:100%">Portföye Ekle</button>
        </div>
        <div class="panel" id="mod_tasks">
            <h2><i data-lucide="check-square"></i> Yapılacaklar</h2>
            <div id="taskList" style="max-height:150px; overflow-y:auto"></div>
            <div style="display:flex; gap:5px; margin-top:10px">
                <input id="taskInput" placeholder="Yeni görev..." style="margin:0">
                <button onclick="window.addTask()">+</button>
            </div>
        </div>
        <div class="panel" id="mod_finance">
            <h2><i data-lucide="wallet"></i> Nakit Akışı</h2>
            <div id="finances" style="max-height:120px; overflow-y:auto"></div>
            <div id="totalFinance" style="text-align:right; font-weight:800; color:var(--accent); margin-top:10px">0 TL</div>
            <div style="display:flex; gap:8px; margin-top:10px">
                <input id="financeInput" placeholder="Yemek 150" style="margin:0">
                <button onclick="window.addFinance()">+</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
