<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, onValue, push, remove, update } 
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // BURAYA KENDİ FIREBASE CONFIG BİLGİLERİNİ YAPIŞTIR!
      const firebaseConfig = {
      apiKey: "AIzaSyDnvY1frFDXMbMspy8a-z_Z41ofSz8wu2k",
      authDomain: "korkmazdashboard.firebaseapp.com",
      databaseURL: "https://korkmazdashboard-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "korkmazdashboard",
      storageBucket: "korkmazdashboard.firebasestorage.app",
      messagingSenderId: "119430771116",
      appId: "1:119430771116:web:c7d25cfb8f320cbb940a09",
      measurementId: "G-87JCTF09T7"
    };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // GLOBAL DEĞİŞKENLER
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();
      let selectedDay = null;
      let selectedEmoji = "";
      const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];

      // --- TAKVİM FONKSİYONLARI ---
      window.openMonth = (m) => {
        currentMonth = m;
        document.getElementById("monthTitle").innerText = months[m] + " " + currentYear;
        const daysDiv = document.getElementById("days");
        daysDiv.innerHTML = "";

        const firstDay = new Date(currentYear, m, 1).getDay();
        const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
        const daysInMonth = new Date(currentYear, m + 1, 0).getDate();

        for (let i = 0; i < startOffset; i++) {
          const empty = document.createElement("div");
          empty.className = "day empty";
          daysDiv.appendChild(empty);
        }

        for (let i = 1; i <= daysInMonth; i++) {
          const d = document.createElement("div");
          d.className = "day";
          d.innerText = i;
          
          const dbRef = ref(db, `calendar/${currentYear}/${m}/${i}`);
          onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.emoji) {
                let eSpan = d.querySelector(".day-emoji") || document.createElement("span");
                eSpan.className = "day-emoji";
                eSpan.innerText = data.emoji;
                d.appendChild(eSpan);
            }
          });

          d.onclick = () => selectDay(i, d);
          daysDiv.appendChild(d);
        }
      };

      window.selectDay = (d, element) => {
        selectedDay = d;
        document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        
        const dbRef = ref(db, `calendar/${currentYear}/${currentMonth}/${d}`);
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById("note").value = data.text || "";
            selectedEmoji = data.emoji || "";
            document.getElementById("selectedDateText").innerText = `${d} ${months[currentMonth]} Notu`;
        }, { onlyOnce: true });
      };

      window.saveNote = () => {
        if (!selectedDay) return;
        set(ref(db, `calendar/${currentYear}/${currentMonth}/${selectedDay}`), {
          text: document.getElementById("note").value,
          emoji: selectedEmoji
        });
      };

      window.setEmoji = (e) => { selectedEmoji = e; };

      // --- GÖREV YÖNETİMİ ---
      window.addTask = () => {
        const input = document.getElementById("taskInput");
        if (!input.value) return;
        const newEntry = push(ref(db, 'tasks'));
        set(newEntry, { text: input.value, done: false });
        input.value = "";
      };

      window.toggleTask = (id, status) => {
        update(ref(db, 'tasks/' + id), { done: !status });
      };

      window.deleteTask = (id) => {
        remove(ref(db, 'tasks/' + id));
      };

      onValue(ref(db, 'tasks'), (snapshot) => {
        const container = document.getElementById("tasks");
        container.innerHTML = "";
        const data = snapshot.val();
        for (let id in data) {
          container.innerHTML += `
            <div class="item-row">
                <span class="item-text ${data[id].done ? 'done' : ''}" onclick="toggleTask('${id}', ${data[id].done})">${data[id].text}</span>
                <button class="del-btn" onclick="deleteTask('${id}')">×</button>
            </div>`;
        }
      });

      // --- FİNANS YÖNETİMİ ---
      window.addFinance = () => {
        const input = document.getElementById("financeInput");
        if (!input.value) return;
        push(ref(db, 'finances'), { text: input.value });
        input.value = "";
      };

      window.deleteFinance = (id) => {
        remove(ref(db, 'finances/' + id));
      };

      onValue(ref(db, 'finances'), (snapshot) => {
        const container = document.getElementById("finances");
        container.innerHTML = "";
        const data = snapshot.val();
        for (let id in data) {
          container.innerHTML += `
            <div class="item-row">
                <span class="item-text">${data[id].text}</span>
                <button class="del-btn" onclick="deleteFinance('${id}')">×</button>
            </div>`;
        }
      });

      // AYLARI OLUŞTUR
      const monthsDiv = document.getElementById("months");
      months.forEach((m, i) => {
          const div = document.createElement("div");
          div.className = "month" + (i === currentMonth ? " active" : "");
          div.innerText = m;
          div.onclick = () => {
              document.querySelectorAll('.month').forEach(el => el.classList.remove('active'));
              div.classList.add('active');
              openMonth(i);
          };
          monthsDiv.appendChild(div);
      });
      openMonth(currentMonth);
    </script>

    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        #app { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--panel); border-radius: 16px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        #months { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .month { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.8rem; }
        .month.active { background: var(--accent); color: var(--bg); font-weight: bold; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 10px; }
        #days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: rgba(255,255,255,0.03); cursor: pointer; font-size: 0.9rem; position: relative; }
        .day.selected { border: 2px solid var(--accent); }
        .day-emoji { position: absolute; bottom: 2px; right: 2px; font-size: 0.7rem; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; }
        .item-text.done { text-decoration: line-through; color: var(--text-muted); }
        input, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .del-btn { background: transparent; color: var(--danger); font-size: 1.2rem; }
        .emoji-btn { background: rgba(255,255,255,0.05); border: none; cursor: pointer; padding: 5px; border-radius: 4px; }
        @media (max-width: 1024px) { #app { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="app">
    <div class="panel">
        <h2>📅 Takvim</h2>
        <div id="months"></div>
        <h3 id="monthTitle" style="text-align: center;"></h3>
        <div class="calendar-header"><span>PT</span><span>SA</span><span>ÇA</span><span>PE</span><span>CU</span><span>CT</span><span>PZ</span></div>
        <div id="days"></div>
        <div style="margin-top:20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px;">
            <h4 id="selectedDateText" style="margin-top:0">Gün Seçin</h4>
            <div style="margin-bottom:10px">
                <button class="emoji-btn" onclick="setEmoji('✅')">✅</button>
                <button class="emoji-btn" onclick="setEmoji('🚀')">🚀</button>
                <button class="emoji-btn" onclick="setEmoji('💡')">💡</button>
                <button class="emoji-btn" onclick="setEmoji('💰')">💰</button>
                <button class="emoji-btn" onclick="setEmoji('⚠️')">⚠️</button>
            </div>
            <textarea id="note"></textarea>
            <button onclick="saveNote()" style="width:100%; margin-top:10px">Buluta Kaydet</button>
        </div>
    </div>

    <div class="panel">
        <h2>✅ Görevler</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="taskInput" placeholder="Yeni görev...">
            <button onclick="addTask()">+</button>
        </div>
        <div id="tasks"></div>
    </div>

    <div class="panel">
        <h2>💰 Finans</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input id="financeInput" placeholder="Harcama...">
            <button onclick="addFinance()">+</button>
        </div>
        <div id="finances"></div>
    </div>
</div>

</body>
</html>
