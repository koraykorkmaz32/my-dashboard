  <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS | Command Center</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, set, onValue, push, remove, update, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // FIREBASE CONFIG - BİLGİLERİNİ BURAYA GİR
      const firebaseConfig = {
          apiKey: "AIzaSyDnvY1frFDXMbMspy8a-z_Z41ofSz8wu2k",
          authDomain: "korkmazdashboard.firebaseapp.com",
          databaseURL: "https://korkmazdashboard-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "korkmazdashboard",
          storageBucket: "korkmazdashboard.firebasestorage.app",
          messagingSenderId: "119430771116",
          appId: "1:119430771116:web:c7d25cfb8f320cbb940a09",
          measurementId: "G-87JCTF09T7"
        };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const auth = getAuth(app);
      let userPath = "";

      // FONKSİYONLARI PENCERE (WINDOW) KAPSAMINA ALIYORUZ
      window.handleLogin = async () => {
          const email = document.getElementById("email").value;
          const pass = document.getElementById("pass").value;
          try { await signInWithEmailAndPassword(auth, email, pass); } 
          catch (err) { alert("Hata: " + err.message); }
      };

      window.handleRegister = async () => {
          const email = document.getElementById("email").value;
          const pass = document.getElementById("pass").value;
          try { await createUserWithEmailAndPassword(auth, email, pass); } 
          catch (err) { alert("Kayıt Hatası: " + err.message); }
      };

      window.handleLogout = () => signOut(auth);

      onAuthStateChanged(auth, (user) => {
          const loginScreen = document.getElementById("loginScreen");
          const dashboard = document.getElementById("app");
          if (user) {
              userPath = `users/${user.uid}/`;
              loginScreen.style.display = "none";
              dashboard.style.display = "grid";
              initDashboard();
          } else {
              loginScreen.style.display = "flex";
              dashboard.style.display = "none";
          }
      });

      // --- DASHBOARD ANA MANTIK ---
      function initDashboard() {
          // Ayarları Çek
          onValue(ref(db, userPath + 'settings'), (snap) => {
              const data = snap.val() || { userName: "Şef", city: "Istanbul", lat: 41.0082, lon: 28.9784 };
              document.getElementById("greeting").innerText = `Selam, ${data.userName}!`;
              document.getElementById("userNameInput").value = data.userName;
              updateWeather(data.lat, data.lon, data.city);
          });

          // Modül Görünürlüğü
          onValue(ref(db, userPath + 'settings/modules'), (snap) => {
              const mods = snap.val() || { mod_weather:true, mod_stocks:true, mod_finance:true, mod_tasks:true, mod_alerts:true };
              Object.keys(mods).forEach(id => {
                  const el = document.getElementById(id);
                  if (el) mods[id] ? el.classList.remove('hidden') : el.classList.add('hidden');
                  const chk = document.getElementById('chk_'+id);
                  if(chk) chk.checked = mods[id];
              });
          });

          // Verileri Yükle
          renderStocks();
          renderFinance();
          renderTasks();
          renderAlerts();
          openMonth(new Date().getMonth());
          lucide.createIcons();
      }

      // --- DİĞER TÜM FONKSİYONLAR (BORSA, FİNANS, GÖREV, HAVA) ---
      window.addStock = () => {
          const s = document.getElementById("stockSymbol").value.toUpperCase();
          const n = document.getElementById("stockNote").value;
          if(s) push(ref(db, userPath + 'stocks'), { symbol: s, note: n });
      };
      function renderStocks() {
          onValue(ref(db, userPath + 'stocks'), (snap) => {
              const container = document.getElementById("stockList"); container.innerHTML = "";
              const data = snap.val();
              for (let id in data) container.innerHTML += `<div class="item-row"><div><b>${data[id].symbol}</b><br><small>${data[id].note}</small></div><button class="del-btn" onclick="deleteItem('stocks/${id}')">×</button></div>`;
          });
      }

      window.addTask = () => {
          const val = document.getElementById("taskInput").value;
          if(val) push(ref(db, userPath + 'tasks'), { text: val, done: false });
          document.getElementById("taskInput").value = "";
      };
      function renderTasks() {
          onValue(ref(db, userPath + 'tasks'), (snap) => {
              const container = document.getElementById("taskList"); container.innerHTML = "";
              const data = snap.val();
              for (let id in data) container.innerHTML += `<div class="item-row"><span class="${data[id].done ? 'done' : ''}" onclick="update(ref(db, '${userPath}tasks/${id}'), {done: !${data[id].done}})">${data[id].text}</span><button class="del-btn" onclick="deleteItem('tasks/${id}')">×</button></div>`;
          });
      }

      window.addFinance = () => {
          const val = document.getElementById("financeInput").value;
          if(val) push(ref(db, userPath + 'finances'), { text: val });
          document.getElementById("financeInput").value = "";
      };
      function renderFinance() {
          onValue(ref(db, userPath + 'finances'), (snap) => {
              const container = document.getElementById("finances"); container.innerHTML = "";
              let total = 0; const data = snap.val();
              for (let id in data) {
                  container.innerHTML += `<div class="item-row"><span>${data[id].text}</span><button class="del-btn" onclick="deleteItem('finances/${id}')">×</button></div>`;
                  const amount = data[id].text.match(/\d+/g);
                  if (amount) total += parseInt(amount[amount.length - 1]);
              }
              document.getElementById("totalFinance").innerText = `Toplam: ${total} TL`;
          });
      }

      function renderAlerts() {
          onValue(query(ref(db, userPath + 'alerts'), limitToLast(5)), (snap) => {
              const container = document.getElementById("alertList"); container.innerHTML = "";
              const data = snap.val();
              for (let id in data) container.innerHTML = `<div class="item-row alert-row"><b>⚠️ ${data[id].symbol || 'Sinyal'}</b><span>${data[id].message || data[id]}</span></div>` + container.innerHTML;
          });
      }

      // Hava Durumu API
      async function updateWeather(lat, lon, city) {
          document.getElementById("cityName").innerText = city;
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability,windspeed_10m&current_weather=true&timezone=auto`);
          const data = await res.json();
          document.getElementById("temp").innerText = `${data.current_weather.temperature}°C`;
          let html = "";
          for(let i=0; i<6; i++) {
              html += `<div class="weather-row"><span>${data.hourly.time[i].split("T")[1]}</span><b>${data.hourly.temperature_2m[i]}°</b><span>%${data.hourly.precipitation_probability[i]} 🌧️</span></div>`;
          }
          document.getElementById("hourlyForecast").innerHTML = html;
      }

      window.searchCity = async () => {
          const city = document.getElementById("cityInput").value;
          const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=tr&format=json`);
          const data = await res.json();
          if (data.results) {
              const loc = data.results[0];
              update(ref(db, userPath + 'settings'), { city: loc.name, lat: loc.latitude, lon: loc.longitude });
          }
      };

      // Takvim
      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();
      const months = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
      window.openMonth = (m) => {
          currentMonth = m; document.getElementById("monthTitle").innerText = months[m] + " " + currentYear;
          const daysDiv = document.getElementById("days"); daysDiv.innerHTML = "";
          const firstDay = new Date(currentYear, m, 1).getDay();
          const offset = (firstDay === 0) ? 6 : firstDay - 1;
          for (let i = 0; i < offset; i++) daysDiv.innerHTML += `<div class="day empty"></div>`;
          for (let i = 1; i <= new Date(currentYear, m + 1, 0).getDate(); i++) {
              const d = document.createElement("div"); d.className = "day"; d.innerText = i;
              onValue(ref(db, userPath + `calendar/${currentYear}/${m}/${i}`), (snap) => { if (snap.val()?.emoji) d.innerHTML = `${i}<span class="day-emoji">${snap.val().emoji}</span>`; });
              d.onclick = () => selectDay(i, d); daysDiv.appendChild(d);
          }
      };

      // Yardımcılar
      window.toggleSettingsMenu = (e) => { e.stopPropagation(); document.getElementById('settingsMenu').classList.toggle('active'); };
      window.updateModuleView = (modId, isChecked) => update(ref(db, userPath + 'settings/modules'), { [modId]: isChecked });
      window.deleteItem = (p) => remove(ref(db, userPath + p));
      window.saveName = () => set(ref(db, userPath + 'settings/userName'), document.getElementById("userNameInput").value);
      window.clearAlerts = () => remove(ref(db, userPath + 'alerts'));

      // PWA Kaydı
      if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>

    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.9); --accent: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; }
        .login-card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 320px; text-align: center; }
        
        /* DASHBOARD */
        #app { display: none; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; max-width: 1600px; margin: auto; padding: 20px; }
        .panel { background: var(--card); backdrop-filter: blur(20px); border-radius: 28px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none !important; }

        /* SETTINGS */
        .settings-drawer { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .settings-btn { width: 45px; height: 45px; border-radius: 12px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); cursor:pointer; color:var(--accent); display:flex; align-items:center; justify-content:center; }
        .settings-menu { display:none; position:absolute; right:0; top:55px; background: #0f172a; border: 1px solid var(--accent); padding:20px; border-radius:20px; width:220px; }
        .settings-menu.active { display:block; }

        /* TAKVİM */
        #days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: rgba(255,255,255,0.02); cursor: pointer; font-size: 0.8rem; position: relative; }
        .day.selected { background: var(--accent); color: #000; font-weight: 700; }
        #months { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin-bottom: 10px; }
        .month { font-size: 0.6rem; padding: 6px; background: rgba(255,255,255,0.05); border-radius: 6px; cursor: pointer; text-align: center; }
        .month.active { background: var(--accent); color: #000; }

        /* LISTS */
        h2 { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 8px; font-size: 0.85rem; }
        input, textarea { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 14px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .del-btn { background: transparent; color: #ef4444; font-size: 1.2rem; border: none; }
        .done { text-decoration: line-through; opacity: 0.4; }
        .alert-row { border-left: 4px solid #f87171; background: rgba(248, 113, 113, 0.05); }
        .weather-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.75rem; }

        @media (max-width: 1100px) { #app { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <h1 style="font-size: 1.5rem; margin-bottom: 20px;">Life OS Login</h1>
        <input id="email" type="email" placeholder="E-posta">
        <input id="pass" type="password" placeholder="Şifre">
        <div style="display:flex; gap:10px; margin-top:10px">
            <button onclick="window.handleLogin()" style="flex:1">Giriş Yap</button>
            <button onclick="window.handleRegister()" style="flex:1; background:rgba(255,255,255,0.1); color:#fff">Kayıt Ol</button>
        </div>
    </div>
</div>

<div class="settings-drawer">
    <button class="settings-btn" onclick="window.toggleSettingsMenu(event)"><i data-lucide="settings"></i></button>
    <div class="settings-menu" id="settingsMenu">
        <b style="font-size:0.7rem; color:var(--accent)">MODÜLLER</b>
        <label>Hava Durumu <input type="checkbox" id="chk_mod_weather" onchange="window.updateModuleView('mod_weather', this.checked)"></label>
        <label>Alarmlar <input type="checkbox" id="chk_mod_alerts" onchange="window.updateModuleView('mod_alerts', this.checked)"></label>
        <label>Borsa <input type="checkbox" id="chk_mod_stocks" onchange="window.updateModuleView('mod_stocks', this.checked)"></label>
        <label>Finans <input type="checkbox" id="chk_mod_finance" onchange="window.updateModuleView('mod_finance', this.checked)"></label>
        <label>Görevler <input type="checkbox" id="chk_mod_tasks" onchange="window.updateModuleView('mod_tasks', this.checked)"></label>
        <button onclick="window.handleLogout()" style="width:100%; margin-top:15px; background:#ef4444; color:#fff">Çıkış Yap</button>
    </div>
</div>

<div id="app">
    <div style="display:flex; flex-direction:column; gap:20px">
        <div class="panel">
            <h1 id="greeting" style="margin:0; font-size:1.4rem">Selam!</h1>
            <input id="userNameInput" onchange="window.saveName()" placeholder="Adın..." style="margin-top:10px; font-size:0.8rem">
        </div>
        <div class="panel" id="mod_weather">
            <h2><i data-lucide="cloud"></i> <span id="cityName">Şehir</span></h2>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
                <span id="temp" style="font-size:2.5rem; font-weight:800">--°C</span>
                <div style="display:flex; gap:5px"><input id="cityInput" placeholder="Şehir..." style="width:70px; margin:0"><button onclick="window.searchCity()"><i data-lucide="search" size="14"></i></button></div>
            </div>
            <div id="hourlyForecast"></div>
        </div>
    </div>

    <div class="panel" id="mod_calendar">
        <h2><i data-lucide="calendar"></i> Takvim</h2>
        <div id="months"></div>
        <h3 id="monthTitle" style="text-align:center; font-size:1rem; margin:15px 0"></h3>
        <div id="days"></div>
        <div style="margin-top:25px; background:rgba(255,255,255,0.03); padding:20px; border-radius:24px;">
            <div id="selectedDateText">Gün Seçin</div>
            <textarea id="note" placeholder="Notun..." style="height:100px; margin-top:10px"></textarea>
            <button onclick="window.saveNote()" style="width:100%">Buluta Kaydet</button>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:20px">
        <div class="panel" id="mod_alerts">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 style="margin:0"><i data-lucide="bell"></i> Alarmlar</h2>
                <button onclick="window.clearAlerts()" style="font-size:0.6rem">Temizle</button>
            </div>
            <div id="alertList"></div>
        </div>
        <div class="panel" id="mod_stocks">
            <h2><i data-lucide="trending-up"></i> Borsa</h2>
            <div id="stockList"></div>
            <input id="stockSymbol" placeholder="Hisse (ISBTR)"><button onclick="window.addStock()" style="width:100%">Ekle</button>
        </div>
        <div class="panel" id="mod_tasks">
            <h2><i data-lucide="check-square"></i> Görevler</h2>
            <div id="taskList"></div>
            <div style="display:flex; gap:5px"><input id="taskInput" placeholder="Yeni..." style="margin:0"><button onclick="window.addTask()">+</button></div>
        </div>
        <div class="panel" id="mod_finance">
            <h2><i data-lucide="wallet"></i> Finans</h2>
            <div id="finances"></div>
            <div id="totalFinance" style="text-align:right; font-weight:800; color:var(--accent); margin-top:10px">0 TL</div>
            <div style="display:flex; gap:8px; margin-top:10px"><input id="financeInput" placeholder="Yemek 150" style="margin:0"><button onclick="window.addFinance()">+</button></div>
        </div>
    </div>
</div>

</body>
</html>
